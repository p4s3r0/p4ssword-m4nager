services:
  database:
    image: postgres:13
    environment:
      POSTGRES_DB: p4ssword-m4nager-v2
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DB_USER} -d p4ssword-m4nager-v2"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      RAILS_ENV: production
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      DB_HOST: database
      DB_PORT: "5432"
      DB_NAME: p4ssword-m4nager-v2
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - app
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "/api"
    ports:
      - "8080:80"
    volumes:
      - ./frontend/nginx.local.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app
    depends_on:
      - backend
    restart: unless-stopped

networks:
  app:

volumes:
  postgres_data: